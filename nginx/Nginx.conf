worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ── Rate-limit zones ─────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=auth_zone:10m       rate=100r/m;
    limit_req_zone $binary_remote_addr zone=api_zone:10m        rate=500r/m;
    limit_req_zone $binary_remote_addr zone=infer_zone:10m      rate=10r/m;
    limit_req_zone $binary_remote_addr zone=agent_zone:10m      rate=1r/s;
    limit_req_zone $binary_remote_addr zone=superuser_zone:10m  rate=1r/s;

    limit_req_status 429;
    add_header Retry-After 60 always;

    # ── Upstream services ────────────────────────────────────────────────────
    upstream backend    { server backend:8000; }
    upstream frontend   { server frontend:3000; }
    upstream fhir       { server fhir-server:8080; }
    upstream minio      { server minio:9000; }
    upstream rag_agent  { server rag-agent:8004; }

    # ── HTTP server (dev: sin redirigir a HTTPS para evitar problemas con certs) ──
    server {
        listen 80;
        server_name _;

        # Anti-Slowloris
        client_body_timeout    10s;
        send_timeout           10s;
        keepalive_timeout      30s;

        # Max payload for medical images
        client_max_body_size   10M;

        # ── Security headers ─────────────────────────────────────────────────
        add_header X-Frame-Options            "DENY"                  always;
        add_header X-Content-Type-Options     "nosniff"               always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin" always;

        # ── MinIO proxy ───────────────────────────────────────────────────────
        # El browser accede por http://localhost/minio/...
        # Nginx reenvía a minio:9000 con Host: minio:9000
        # La firma AWS fue generada con Host: minio:9000 → coincide ✅
        location /minio/ {
            proxy_pass         http://minio/;
            proxy_set_header   Host minio:9000;        # ✅ clave: host debe coincidir con la firma
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_buffering    off;
        }

        # ── Auth endpoints — 100 req/min ─────────────────────────────────────
        location /auth/ {
            limit_req zone=auth_zone burst=20 nodelay;
            proxy_pass         http://backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Inference endpoints — 10 req/min ─────────────────────────────────
        location /infer {
            limit_req zone=infer_zone burst=5 nodelay;
            proxy_pass         http://backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        # ── Backend API ───────────────────────────────────────────────────────
        location /fhir/ {
            limit_req zone=api_zone burst=50 nodelay;
            proxy_pass         http://backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        location /admin/ {
            limit_req zone=api_zone burst=50 nodelay;
            proxy_pass         http://backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        # ── API SuperUser — 60 req/min ────────────────────────────────────────
        location /api/v1/superuser/ {
            limit_req zone=superuser_zone burst=10 nodelay;
            proxy_pass         http://backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/ {
            proxy_pass         http://backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        # ── RAG Agent — 60 req/min ────────────────────────────────────────────
        location /agent/ {
            limit_req zone=agent_zone burst=5 nodelay;
            proxy_pass         http://rag_agent;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 60s;
        }

        # ── Frontend SPA ──────────────────────────────────────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }
    }

    # ── HTTPS server ─────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        client_body_timeout    10s;
        send_timeout           10s;
        keepalive_timeout      30s;
        client_max_body_size   10M;

        add_header X-Frame-Options            "DENY"                  always;
        add_header X-Content-Type-Options     "nosniff"               always;
        add_header Strict-Transport-Security  "max-age=31536000"      always;
        add_header Content-Security-Policy    "default-src 'self' 'unsafe-inline' data:" always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin" always;

        # ── MinIO proxy (HTTPS) ───────────────────────────────────────────────
        location /minio/ {
            proxy_pass         http://minio/;
            proxy_set_header   Host minio:9000;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_buffering    off;
        }

        location /auth/ {
            limit_req zone=auth_zone burst=20 nodelay;
            proxy_pass         http://backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /infer {
            limit_req zone=infer_zone burst=5 nodelay;
            proxy_pass         http://backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        location /fhir/ {
            limit_req zone=api_zone burst=50 nodelay;
            proxy_pass         http://backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        location /admin/ {
            limit_req zone=api_zone burst=50 nodelay;
            proxy_pass         http://backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        location /api/v1/superuser/ {
            limit_req zone=superuser_zone burst=10 nodelay;
            proxy_pass         http://backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        location /api/v1/ {
            proxy_pass         http://backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        location /agent/ {
            limit_req zone=agent_zone burst=5 nodelay;
            proxy_pass         http://rag_agent;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 60s;
        }

        location / {
            proxy_pass         http://frontend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }
    }
}