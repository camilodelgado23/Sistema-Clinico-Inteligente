worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ── Real client IP: Cloudflare pasa la IP real en CF-Connecting-IP.
    # Si no viene por CF (acceso directo), usamos remote_addr como fallback.
    map $http_cf_connecting_ip $rate_limit_key {
        ""      $binary_remote_addr;
        default $http_cf_connecting_ip;
    }

    # ── Rate-limit zones (keyed por IP real, no por IP de Cloudflare) ────────
    limit_req_zone $rate_limit_key zone=auth_zone:10m       rate=100r/m;
    limit_req_zone $rate_limit_key zone=api_zone:10m        rate=500r/m;
    limit_req_zone $rate_limit_key zone=infer_zone:10m      rate=10r/m;
    limit_req_zone $rate_limit_key zone=agent_zone:10m      rate=1r/s;
    limit_req_zone $rate_limit_key zone=superuser_zone:10m  rate=1r/s;

    limit_req_status 429;
    add_header Retry-After 60 always;

    # ── Upstream services ────────────────────────────────────────────────────
    upstream backend      { server backend:8000; }
    upstream frontend     { server frontend:3000; }
    upstream minio_api    { server minio:9000; }
    upstream rag_agent    { server rag-agent:8004; }
    upstream orchestrator { server orchestrator:8003; }

    # ── Cloudflare IP allowlist (fuente: cloudflare.com/ips) ─────────────────
    # Solo Cloudflare + red interna Docker pueden conectar al VPS.
    # Acceso directo por IP pública es bloqueado con 444 (sin respuesta).
    geo $is_cloudflare {
        default          0;
        # IPv4 — Cloudflare
        103.21.244.0/22  1;
        103.22.200.0/22  1;
        103.31.4.0/22    1;
        104.16.0.0/13    1;
        104.24.0.0/14    1;
        108.162.192.0/18 1;
        131.0.72.0/22    1;
        141.101.64.0/18  1;
        162.158.0.0/15   1;
        172.64.0.0/13    1;
        173.245.48.0/20  1;
        188.114.96.0/20  1;
        190.93.240.0/20  1;
        197.234.240.0/22 1;
        198.41.128.0/17  1;
        # IPv6 — Cloudflare
        2400:cb00::/32   1;
        2606:4700::/32   1;
        2803:f800::/32   1;
        2405:b500::/32   1;
        2405:8100::/32   1;
        2a06:98c0::/29   1;
        2c0f:f248::/32   1;
        # Red interna Docker (clinical_net 172.18.0.0/16) + localhost
        172.18.0.0/16    1;
        127.0.0.1/32     1;
    }

    # ── HTTP → HTTPS redirect ────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        # Bloquear acceso directo al VPS (no pasa por Cloudflare)
        if ($is_cloudflare = 0) { return 444; }
        return 301 https://$host$request_uri;
    }

    # ── HTTPS server ─────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name _;

        # Bloquear acceso directo al VPS (no pasa por Cloudflare)
        if ($is_cloudflare = 0) { return 444; }

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        client_body_timeout    10s;
        send_timeout           10s;
        keepalive_timeout      65s;
        client_max_body_size   20M;

        add_header X-Frame-Options            "DENY"                  always;
        add_header X-Content-Type-Options     "nosniff"               always;
        add_header Strict-Transport-Security  "max-age=31536000"      always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin" always;

        # ── WebSocket — orquestador ───────────────────────────────────────────
        location /ws {
            proxy_pass             http://orchestrator;
            proxy_http_version     1.1;
            proxy_set_header       Upgrade $http_upgrade;
            proxy_set_header       Connection "upgrade";
            proxy_set_header       Host $host;
            proxy_set_header       X-Real-IP $remote_addr;
            proxy_read_timeout     3600s;
            proxy_send_timeout     3600s;
        }

        # ── MinIO proxy ───────────────────────────────────────────────────────
        # Host: minio:9000 debe coincidir con el host usado al generar la firma AWS
        location /minio/ {
            proxy_pass         http://minio_api/;
            proxy_set_header   Host minio:9000;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_buffering    off;
        }

        # ── Health checks ────────────────────────────────────────────────────
        location = /health {
            proxy_pass         http://backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        # ── Auth endpoints — 100 req/min ─────────────────────────────────────
        location /auth/ {
            limit_req zone=auth_zone burst=20 nodelay;
            proxy_pass         http://backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Inference endpoints — 10 req/min ─────────────────────────────────
        location /infer {
            limit_req zone=infer_zone burst=5 nodelay;
            proxy_pass         http://backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── FHIR API ─────────────────────────────────────────────────────────
        location /fhir/ {
            limit_req zone=api_zone burst=50 nodelay;
            proxy_pass         http://backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /admin/ {
            limit_req zone=api_zone burst=50 nodelay;
            proxy_pass         http://backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── API SuperUser — 60 req/min ────────────────────────────────────────
        location /api/v1/superuser/ {
            limit_req zone=superuser_zone burst=10 nodelay;
            proxy_pass         http://backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /api/v1/ {
            proxy_pass         http://backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── RAG Agent — 60 req/min ────────────────────────────────────────────
        location /agent/ {
            limit_req zone=agent_zone burst=5 nodelay;
            proxy_pass         http://rag_agent;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── Frontend SPA ──────────────────────────────────────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
